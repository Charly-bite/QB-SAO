name: CD

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  checks: read
  actions: read
  contents: read

jobs:
  ci-gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to pass
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checkName = 'Tests (Python 3.12)';
            const maxWait = 300; // 5 minutes
            const interval = 15; // seconds
            let elapsed = 0;

            while (elapsed < maxWait) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo, ref: sha, check_name: checkName,
              });
              const run = checks.check_runs[0];
              if (run) {
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    core.info(`✅ CI check "${checkName}" passed.`);
                    return;
                  }
                  core.setFailed(`❌ CI check "${checkName}" concluded: ${run.conclusion}`);
                  return;
                }
                core.info(`⏳ CI check "${checkName}" status: ${run.status}. Waiting ${interval}s...`);
              } else {
                core.info(`⏳ CI check "${checkName}" not found yet. Waiting ${interval}s...`);
              }
              await new Promise(r => setTimeout(r, interval * 1000));
              elapsed += interval;
            }
            core.setFailed(`⏰ Timed out waiting for CI check "${checkName}" after ${maxWait}s.`);

  package:
    name: Build deploy artifact
    needs: ci-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release bundle
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/open-oms-${{ github.sha }}.zip HEAD

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-oms-${{ github.sha }}
          path: dist/open-oms-${{ github.sha }}.zip

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: package
    environment: development
    if: |
      (github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'development')) &&
      secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: open-oms-${{ github.sha }}
          path: dist

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: dist/open-oms-${{ github.sha }}.zip
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Run remote deploy command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="${DEPLOY_DIR}/open-oms"
            BUNDLE="${DEPLOY_DIR}/open-oms-${{ github.sha }}.zip"
            mkdir -p "${APP_DIR}"
            unzip -o "${BUNDLE}" -d "${APP_DIR}"
            cd "${APP_DIR}"
            if [ -f scripts/deploy_dev.bat ]; then
              echo "Windows deployment script found. Run it manually on Windows host if required."
            fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: package
    environment: production
    if: |
      (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')) &&
      secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: open-oms-${{ github.sha }}
          path: dist

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: dist/open-oms-${{ github.sha }}.zip
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Run remote deploy command
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="${DEPLOY_DIR}/open-oms"
            BUNDLE="${DEPLOY_DIR}/open-oms-${{ github.sha }}.zip"
            mkdir -p "${APP_DIR}"
            unzip -o "${BUNDLE}" -d "${APP_DIR}"
            cd "${APP_DIR}"
            echo "Production artifact deployed. Add your process restart command here."
