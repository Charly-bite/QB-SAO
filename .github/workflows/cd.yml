name: CD

on:
  # Only trigger after CI workflow completes successfully
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        default: development
        type: choice
        options:
          - development
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# DEPLOYMENT WORKFLOW
# ---------------------------------------------------------------------------
# This project deploys to Windows servers via manual git pull:
#
#   Development:  push to 'develop'  →  on dev machine:  git pull origin develop
#   Production:   push to 'main'     →  on prod machine: git pull origin main
#                                     →  run: scripts\deploy_prod.bat
#
# The CD pipeline creates a versioned release artifact for each successful
# CI run.  The actual deployment is done manually on the target machine.
# ---------------------------------------------------------------------------

jobs:
  package:
    name: Build deploy artifact
    runs-on: ubuntu-latest
    # Only run if CI succeeded (or if manually triggered)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine environment
        id: env
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [[ "$BRANCH" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=development" >> "$GITHUB_OUTPUT"
          fi
          echo "sha_short=$(echo ${{ github.event.workflow_run.head_sha || github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create release bundle
        run: |
          mkdir -p dist
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          git archive --format=zip --output=dist/open-oms-${SHA}.zip HEAD

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-oms-${{ steps.env.outputs.environment }}-${{ steps.env.outputs.sha_short }}
          path: dist/open-oms-${{ github.event.workflow_run.head_sha || github.sha }}.zip
          retention-days: 30

      - name: Summary
        run: |
          echo "### ✅ Deploy artifact ready" >> "$GITHUB_SUMMARY"
          echo "" >> "$GITHUB_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_SUMMARY"
          echo "| **Environment** | ${{ steps.env.outputs.environment }} |" >> "$GITHUB_SUMMARY"
          echo "| **Commit** | \`${{ steps.env.outputs.sha_short }}\` |" >> "$GITHUB_SUMMARY"
          echo "| **Branch** | ${{ github.event.workflow_run.head_branch || github.ref_name }} |" >> "$GITHUB_SUMMARY"
          echo "" >> "$GITHUB_SUMMARY"
          echo "**To deploy on the production machine:**" >> "$GITHUB_SUMMARY"
          echo '```bat' >> "$GITHUB_SUMMARY"
          echo "cd C:\\path\\to\\Open-OMS" >> "$GITHUB_SUMMARY"
          echo "git pull origin main" >> "$GITHUB_SUMMARY"
          echo "scripts\\deploy_prod.bat" >> "$GITHUB_SUMMARY"
          echo '```' >> "$GITHUB_SUMMARY"
