name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Enforce coverage threshold
        env:
          FLASK_ENV: testing
        run: |
          python -m pytest tests/ --cov=. --cov-fail-under=99 --cov-report=term-missing -q --no-header

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  syntax-check:
    name: Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile config.py
          python -m py_compile models.py
          python -m py_compile extensions.py
          python -m py_compile core/order_status_manager.py
          python -m py_compile core/user_manager.py
          python -m py_compile core/database_client.py
          python -m py_compile core/sap_connector.py
          python -m py_compile core/sap_sync_worker.py
          python -m py_compile core/system_health.py
          python -m py_compile core/factura_metadata_manager.py
          python -m py_compile core/print_event_matcher.py
          python -m py_compile middleware/request_logger.py
          python -m py_compile routes/auth.py
          python -m py_compile routes/orders.py

