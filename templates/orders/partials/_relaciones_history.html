<!-- Relaciones History -->
<div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden print-hide">
    <div class="px-6 py-4 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
        <h3 class="font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Historial de Relaciones
        </h3>
        <div class="flex items-center gap-2">
            <input type="date" x-model="relacionDateFrom" @change="fetchRelaciones()" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm">
            <span class="text-slate-400">→</span>
            <input type="date" x-model="relacionDateTo" @change="fetchRelaciones()" class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm">
        </div>
    </div>
    <div class="divide-y divide-slate-100">
        <template x-if="relaciones.length === 0">
            <div class="px-6 py-12 text-center">
                <svg class="w-12 h-12 text-slate-200 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p class="text-slate-400 font-medium">No hay relaciones en este rango de fechas</p>
            </div>
        </template>
        <template x-for="rel in relaciones" :key="rel.folio">
            <div class="px-6 py-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center text-sm font-bold" 
                        :class="rel.is_closed ? 'bg-green-100 text-green-700' : 'bg-indigo-100 text-indigo-700'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-slate-800" x-text="rel.folio"></span>
                            <span x-show="rel.is_closed" class="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-semibold">Cerrado</span>
                            <span x-show="!rel.is_closed" class="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-semibold">Abierto</span>
                        </div>
                        <div class="text-xs text-slate-500 mt-0.5">
                            <span x-text="rel.relacion_date.split('-').reverse().join('/')"></span>
                            · <span x-text="rel.invoice_count + ' facturas'"></span>
                            · Creado por <span class="font-medium" x-text="rel.created_by"></span>
                            <template x-if="rel.notes">
                                <span class="ml-1 text-indigo-500"> · <span x-text="rel.notes"></span></span>
                            </template>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button @click="reprintRelacion(rel.folio)" 
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-semibold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        Descargar
                    </button>
                </div>
            </div>
        </template>
    </div>
</div>
