<!-- Almacén y Logística Tab — Recibido & Entrega management -->
<div x-show="activeTab === 'almacen'" x-cloak class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">

    <!-- Action Bar -->
    <div class="px-4 py-3 flex flex-wrap items-center gap-3 bg-gradient-to-r from-sky-50 to-white border-b border-slate-100">

        <!-- No relación yet -->
        <template x-if="!currentRelacion">
            <p class="text-sm text-slate-400 italic">Genera una relación desde la pestaña de Facturas primero.</p>
        </template>

        <!-- Relación info -->
        <template x-if="currentRelacion">
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-slate-700">Relación:</span>
                <span class="text-sm font-bold text-indigo-600" x-text="currentRelacion.folio"></span>
            </div>
        </template>

        <div class="flex-1"></div>

        <!-- Almacén progress -->
        <template x-if="currentRelacion && currentRelacion.invoices && currentRelacion.invoices.length > 0">
            <div class="flex items-center gap-3">
                <!-- Entrega count -->
                <div class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-[11px] font-bold border"
                    :class="currentRelacion.invoices.filter(i => i.entrega).length === currentRelacion.invoices.length 
                        ? 'bg-green-50 text-green-700 border-green-200' 
                        : 'bg-slate-50 text-slate-600 border-slate-200'">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    <span x-text="currentRelacion.invoices.filter(i => i.entrega).length + '/' + currentRelacion.invoices.length + ' Entregados'"></span>
                </div>
            </div>
        </template>
    </div>

    <!-- Almacén Table -->
    <template x-if="currentRelacion && currentRelacion.invoices && currentRelacion.invoices.length > 0">
        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead class="pendientes-thead">
                    <tr>
                        <th class="text-left" style="width: 40px;">#</th>
                        <th class="text-center w-20">Extra</th>
                        <th class="text-left">No. Factura</th>
                        <th class="text-left">Cliente</th>
                        <th class="text-right">Importe</th>
                        <th class="text-center">Tipo de Envío</th>
                        <th class="text-center w-48">Notas de Crédito</th>
                        <th class="text-center">Crédito</th>
                        <th class="text-center w-28">Rebote</th>
                        <th class="text-center w-28">Entregado</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(inv, idx) in filteredAlmacenInvoices()" :key="inv.invoice_number || idx">
                        <tr class="pendientes-row" x-show="true" :style="idx % 2 === 0 ? '' : 'background-color: #f8fafc;'">
                            <!-- # -->
                            <td style="color: #94a3b8; font-size: 12px; font-weight: 600;" x-text="idx + 1"></td>
                            <!-- Extra -->
                            <td class="text-center">
                                <span class="text-slate-600 text-xs font-medium" x-text="inv.nota || inv.observaciones || '-'"></span>
                            </td>
                            <!-- No. Factura -->
                            <td><span class="pendientes-invoice-num" x-text="inv.invoice_number || ''"></span></td>
                            <!-- Cliente -->
                            <td style="color: #334155; font-size: 12px; font-weight: 500;" x-text="inv.customer_name || ''"></td>
                            <!-- Importe -->
                            <td class="text-right">
                                <span class="pendientes-amount" x-text="'$' + Number(inv.total || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})"></span>
                                <span class="pendientes-amount-currency" x-text="inv.currency || 'MXN'"></span>
                            </td>
                            <!-- Tipo de Envío -->
                            <td class="text-center">
                                <span class="inline-flex items-center gap-1"
                                    :class="(inv.shipping_type || 'LOCAL').toUpperCase().includes('FOR') ? 'pendientes-badge-foraneo' : 'pendientes-badge-local'"
                                    x-text="inv.shipping_type || 'LOCAL'">
                                </span>
                            </td>
                            <!-- Notas de Crédito -->
                            <td class="px-2 py-2 text-center" style="color: #64748b; font-size: 12px; vertical-align: top;">
                                <div class="mt-0.5" @click.stop="if(canAuthorizarCredito) editCreditoNotes(inv)" title="Clic para editar nota de crédito">
                                    <template x-if="!inv._editing_credito_notes">
                                        <div class="w-full min-h-[1.5rem] px-1 py-0.5 bg-yellow-50 border border-yellow-200 rounded text-[11px] cursor-pointer" :class="!inv.credito_notes ? 'text-slate-400 italic bg-slate-50 border-transparent' : 'text-slate-800'">
                                            <span x-text="inv.credito_notes || 'Clic para añadir nota'"></span>
                                        </div>
                                    </template>
                                    <template x-if="inv._editing_credito_notes">
                                        <input type="text" x-model="inv._temp_credito_notes" 
                                            @keydown.enter="saveCreditoNotes(inv)" 
                                            @keydown.escape="inv._editing_credito_notes = false"
                                            @blur="saveCreditoNotes(inv)"
                                            x-init="$el.focus()"
                                            class="w-full px-1 py-0.5 border border-amber-400 rounded focus:outline-none focus:ring-1 focus:ring-amber-500 bg-white text-[11px] shadow-sm text-left" />
                                    </template>
                                </div>
                            </td>
                            <!-- Autorización Crédito Status -->
                            <td class="text-center">
                                <template x-if="inv.credito_authorized">
                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-green-100 text-green-700 border border-green-200">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                                        Autorizado
                                    </span>
                                </template>
                                <template x-if="!inv.credito_authorized">
                                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-yellow-100 text-yellow-700 border border-yellow-200">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        Pendiente
                                    </span>
                                </template>
                            </td>
                            <!-- Rebote -->
                            <td class="text-center">
                                <label class="inline-flex items-center gap-2 cursor-pointer select-none group">
                                    <input type="checkbox" :checked="inv.rebote"
                                        @change="inv.rebote = $event.target.checked; toggleFactura(inv.invoice_number, 'rebote', inv.rebote)"
                                        :disabled="!canEditFacturas"
                                        class="w-5 h-5 rounded border-slate-300 text-orange-500 focus:ring-orange-500 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                    <span class="text-xs font-medium transition-colors"
                                        :class="inv.rebote ? 'text-orange-700' : 'text-slate-400'"
                                        x-text="inv.rebote ? 'Sí' : 'No'"></span>
                                </label>
                            </td>
                            <!-- Entrega -->
                            <td class="text-center">
                                <label class="inline-flex items-center gap-2 cursor-pointer select-none group">
                                    <input type="checkbox" :checked="inv.entrega"
                                        @change="inv.entrega = $event.target.checked; toggleFactura(inv.invoice_number, 'entrega', inv.entrega)"
                                        :disabled="!canEditFacturas || inv.rebote"
                                        class="w-5 h-5 rounded border-slate-300 text-green-500 focus:ring-green-500 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                    <span class="text-xs font-medium transition-colors"
                                        :class="inv.entrega ? 'text-green-700' : 'text-slate-400'"
                                        x-text="inv.entrega ? 'Sí' : 'No'"></span>
                                </label>
                            </td>
                        </tr>
                    </template>
                </tbody>
                <!-- Totals footer -->
                <tfoot>
                    <tr class="pendientes-footer">
                        <td colspan="3" class="text-right">
                            <span class="pendientes-footer-label">Total</span>
                        </td>
                        <td class="text-right">
                            <span class="pendientes-footer-total"
                                x-text="'$' + filteredAlmacenInvoices().reduce((s, i) => s + Number(i.total || 0), 0).toLocaleString('es-MX', {minimumFractionDigits: 2})">
                            </span>
                        </td>
                        <td colspan="3"></td>
                        <td class="text-center">
                            <span class="text-xs font-bold"
                                :class="filteredAlmacenInvoices().filter(i => i.entrega).length === filteredAlmacenInvoices().length ? 'text-green-600' : 'text-slate-400'"
                                x-text="filteredAlmacenInvoices().filter(i => i.entrega).length + '/' + filteredAlmacenInvoices().length">
                            </span>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </template>

    <!-- Empty state -->
    <template x-if="!currentRelacion || !currentRelacion.invoices || currentRelacion.invoices.length === 0">
        <div class="px-6 py-16 text-center">
            <div class="flex flex-col items-center gap-3">
                <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <p class="text-slate-500 font-medium">No hay facturas para gestionar</p>
                <p class="text-sm text-slate-400">Genera una relación desde la pestaña de Facturas primero</p>
            </div>
        </div>
    </template>
</div>
