<!-- Estado de Cuenta Floating Windows Loop -->
<template x-for="win in estadoCuentaWindows" :key="win.id">
<div x-data="estadoCuentaWindowApp(win)"
     @bring-estado-cuenta-front.window="if ($event.detail.id === id) bringEstadoCuentaToFront(id)"
     @focus-estado-cuenta.window="if ($event.detail.id === id) minimized = false"
     @close-estado-cuenta.window="if ($event.detail.id === id) closeEstadoCuenta(id)">
    
    <!-- Floating Window -->
    <div x-show="show && !minimized"
         x-cloak
         style="position: fixed; pointer-events: none; inset: 0;"
         :style="'z-index: ' + zIndex + ';'">

        <!-- The Window -->
        <div x-ref="ecWindow"
             class="bg-white border-2 border-slate-500 rounded-xl shadow-2xl flex flex-col overflow-hidden"
             :style="'position: absolute; left: ' + ecWinX + 'px; top: ' + ecWinY + 'px; pointer-events: auto; width: 550px; max-height: 85vh; min-width: 400px; min-height: 300px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); resize: both;'"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95">

            <!-- Title Bar (draggable) -->
            <div @mousedown="ecWinStartDrag($event)"
                 class="px-3.5 py-2.5 flex items-center justify-between bg-slate-800 select-none shrink-0"
                 :class="ecWinDragging ? 'cursor-grabbing' : 'cursor-grab'">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" fill="none" stroke="white" viewBox="0 0 24 24" style="opacity: 0.7;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span style="font-size: 13px; font-weight: 800; color: white;">Estado de Cuenta</span>
                    <span style="font-size: 11px; color: #94a3b8; font-weight: 500;"
                          x-text="data ? data.customer.card_name : ''"></span>
                </div>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <!-- Minimize Button -->
                    <button @click.stop="minimized = true"
                            style="width: 26px; height: 26px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #94a3b8; transition: all 0.15s;"
                            onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'"
                            title="Minimizar">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18h12"/></svg>
                    </button>
                    <!-- Close Button -->
                    <button @click.stop="close()"
                            style="width: 26px; height: 26px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #94a3b8; transition: all 0.15s;"
                            onmouseover="this.style.background='#ef4444'; this.style.color='white'" onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.color='#94a3b8'"
                            title="Cerrar">
                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>

            <!-- Collapsible Body -->
            <div x-show="!ecWinCollapsed" class="flex flex-col flex-1 min-h-0 overflow-hidden">
                <!-- Loading state -->
                <div x-show="loading" style="padding: 40px 0; text-align: center;">
                    <div style="display: inline-block; width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
                    <p style="color: #64748b; margin-top: 10px; font-size: 12px;">Consultando SAP...</p>
                </div>

                <!-- Content -->
                <div x-show="!loading && data" class="flex-1 min-h-0 overflow-y-auto relative p-4" style="height: 100%;">
                    
                    <!-- Customer info bar -->
                    <div class="bg-slate-800 rounded-xl p-3 text-white shadow-md mb-3 flex items-center justify-between">
                        <div>
                            <h3 class="text-sm font-bold" x-text="data ? data.customer.card_name : ''"></h3>
                            <span class="text-[10px] font-mono opacity-70" x-text="data ? data.customer.card_code : ''"></span>
                        </div>
                        <div class="text-right space-y-1 flex gap-4">
                            <div>
                                <span class="text-[9px] uppercase opacity-60">Límite de Crédito</span>
                                <p class="text-xs font-bold text-emerald-300" x-text="data ? '$' + Number(data.customer.credit_limit).toLocaleString('es-MX', {minimumFractionDigits: 2}) : ''"></p>
                            </div>
                            <div>
                                <span class="text-[9px] uppercase opacity-60">Saldo Total</span>
                                <p class="text-xs font-bold text-red-300" x-text="data ? '$' + Number(data.customer.balance).toLocaleString('es-MX', {minimumFractionDigits: 2}) : ''"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Summary totals row -->
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div class="border-2 border-amber-200 bg-amber-50 rounded-xl p-2.5">
                            <span class="text-[10px] font-bold text-amber-600 uppercase">Total MXN Seleccionado</span>
                            <p class="text-base font-black text-amber-800" x-text="'$' + selectedTotalMXN().toLocaleString('es-MX', {minimumFractionDigits: 2})"></p>
                        </div>
                        <div class="border-2 border-blue-200 bg-blue-50 rounded-xl p-2.5">
                            <span class="text-[10px] font-bold text-blue-600 uppercase">Total USD Seleccionado</span>
                            <p class="text-base font-black text-blue-800" x-text="'$' + selectedTotalUSD().toLocaleString('es-MX', {minimumFractionDigits: 2})"></p>
                        </div>
                    </div>

                    <!-- Filters Bar -->
                    <div class="bg-slate-50 border-2 border-slate-200 rounded-xl p-3 mb-3 space-y-2.5">
                        <!-- Top row: Search + Select All -->
                        <div class="flex items-center gap-2">
                            <div class="relative flex-1">
                                <div class="absolute inset-y-0 left-0 pl-2 flex items-center pointer-events-none">
                                    <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </div>
                                <input type="text" x-model="filterSearch" placeholder="Buscar No. Factura..."
                                    style="padding-left: 32px;"
                                    class="block w-full pr-2 py-1.5 border-2 border-slate-200 rounded-lg text-xs focus:outline-none focus:border-emerald-500 transition-colors font-medium text-slate-700" />
                            </div>
                            <div class="flex items-center gap-2 shrink-0">
                                <button @click="toggleAll()" 
                                    class="px-2.5 py-1.5 text-[11px] font-extrabold rounded-lg border-2 transition-all"
                                    :class="allSelected() 
                                        ? 'bg-red-50 text-red-700 border-red-300 hover:bg-red-100' 
                                        : 'bg-emerald-50 text-emerald-700 border-emerald-300 hover:bg-emerald-100'">
                                    <span x-text="allSelected() ? '✕ Deseleccionar Todo' : '✓ Seleccionar Todo'"></span>
                                </button>
                                <span class="text-[11px] font-bold text-slate-500 bg-white px-2 py-1.5 rounded-lg border border-slate-200" 
                                      x-text="filteredSelectedCount() + ' de ' + filteredInvoices().length"></span>
                            </div>
                        </div>

                        <!-- Bottom row: Filters -->
                        <div class="flex items-center gap-3">
                            <!-- Currency filter -->
                            <div class="flex items-center gap-1.5">
                                <span class="text-[11px] font-bold text-slate-600">Moneda:</span>
                                <div class="inline-flex border-2 border-slate-300 rounded-lg overflow-hidden shadow-sm">
                                    <button @click="filterCurrency = 'ALL'" class="px-3 py-1 text-[11px] font-extrabold transition-all border-r border-slate-300"
                                        :class="filterCurrency === 'ALL' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">Todas</button>
                                    <button @click="filterCurrency = 'MXN'" class="px-3 py-1 text-[11px] font-extrabold transition-all border-r border-slate-300"
                                        :class="filterCurrency === 'MXN' ? 'bg-amber-500 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">MXN</button>
                                    <button @click="filterCurrency = 'USD'" class="px-3 py-1 text-[11px] font-extrabold transition-all"
                                        :class="filterCurrency === 'USD' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">USD</button>
                                </div>
                            </div>

                            <!-- Overdue filter -->
                            <div class="flex items-center gap-1.5">
                                <span class="text-[11px] font-bold text-slate-600">Estado:</span>
                                <div class="inline-flex border-2 border-slate-300 rounded-lg overflow-hidden shadow-sm">
                                    <button @click="filterOverdue = 'ALL'" class="px-3 py-1 text-[11px] font-extrabold transition-all border-r border-slate-300"
                                        :class="filterOverdue === 'ALL' ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">Todas</button>
                                    <button @click="filterOverdue = 'UNPAID'" class="px-3 py-1 text-[11px] font-extrabold transition-all border-r border-slate-300"
                                        :class="filterOverdue === 'UNPAID' ? 'bg-red-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">No pagadas</button>
                                    <button @click="filterOverdue = 'PAID'" class="px-3 py-1 text-[11px] font-extrabold transition-all"
                                        :class="filterOverdue === 'PAID' ? 'bg-emerald-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-100'">Pagadas</button>
                                </div>
                            </div>

                            <!-- Date Filter -->
                            <div class="flex items-center gap-1.5">
                                <span class="text-[11px] font-bold text-slate-600">Fecha:</span>
                                <div class="flex items-center gap-1">
                                    <input type="date" x-model="filterStartDate"
                                        class="px-1.5 py-1 text-[11px] font-medium border-2 border-slate-300 rounded-lg focus:outline-none focus:border-emerald-500 bg-white" />
                                    <span class="text-[10px] text-slate-400 font-bold">a</span>
                                    <input type="date" x-model="filterEndDate"
                                        class="px-1.5 py-1 text-[11px] font-medium border-2 border-slate-300 rounded-lg focus:outline-none focus:border-emerald-500 bg-white" />
                                    <button x-show="filterStartDate || filterEndDate" @click="filterStartDate = ''; filterEndDate = ''"
                                        class="p-1 text-slate-400 hover:text-slate-600 hover:bg-slate-200 rounded-lg transition-colors" title="Limpiar fechas">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Invoice table -->
                    <div class="border-2 border-slate-200 rounded-xl overflow-hidden shadow-sm bg-white">
                        <table class="w-full border-collapse text-[11px]">
                            <thead class="sticky top-0 z-10 shadow-sm">
                                <tr class="bg-slate-100 border-b-2 border-slate-300">
                                    <th class="px-2 py-2 text-center w-8 bg-slate-100">
                                        <input type="checkbox" :checked="allSelected()" @change="toggleAll()" class="w-3.5 h-3.5 cursor-pointer accent-emerald-500" />
                                    </th>
                                    <th @click="sortBy('doc_num')" class="px-2 py-2 text-left font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center gap-1">No. Factura <span x-show="sortColumn === 'doc_num'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('doc_date')" class="px-2 py-2 text-center font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-center gap-1">Fecha <span x-show="sortColumn === 'doc_date'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('due_date')" class="px-2 py-2 text-center font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-center gap-1">Vencimiento <span x-show="sortColumn === 'due_date'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('total')" class="px-2 py-2 text-right font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-end gap-1">Adeudo <span x-show="sortColumn === 'total'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('balance')" class="px-2 py-2 text-right font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-end gap-1">Saldo <span x-show="sortColumn === 'balance'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('currency')" class="px-2 py-2 text-center font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-center gap-1">Moneda <span x-show="sortColumn === 'currency'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                    <th @click="sortBy('days_overdue')" class="px-2 py-2 text-center font-extrabold text-slate-700 uppercase tracking-wide bg-slate-100 cursor-pointer hover:bg-slate-200 select-none transition-colors">
                                        <div class="flex items-center justify-center gap-1">Días Atraso <span x-show="sortColumn === 'days_overdue'" class="text-[10px]" x-text="sortDir === 'asc' ? '▲' : '▼'"></span></div>
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(inv, idx) in filteredInvoices()" :key="inv.doc_num">
                                    <tr :class="idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'"
                                        class="border-b border-slate-100 cursor-pointer hover:bg-emerald-50 transition-colors"
                                        @click="toggleInvoice(inv.doc_num)"
                                        @contextmenu.prevent="showECContextMenu($event, inv, data?.customer?.card_code)"
                                        style="cursor: context-menu;">
                                        <td class="px-2 py-2 text-center">
                                            <input type="checkbox" :checked="selected.includes(inv.doc_num)" @click.stop="toggleInvoice(inv.doc_num)" class="w-3.5 h-3.5 cursor-pointer accent-emerald-500" />
                                        </td>
                                        <td class="px-2 py-2 font-bold text-slate-800" x-text="inv.doc_num"></td>
                                        <td class="px-2 py-2 text-center text-slate-500" x-text="formatDocDate(inv.doc_date)"></td>
                                        <td class="px-2 py-2 text-center text-slate-500" x-text="formatDocDate(inv.due_date)"></td>
                                        <td class="px-2 py-2 text-right font-semibold text-slate-600" x-text="'$' + Number(inv.total).toLocaleString('es-MX', {minimumFractionDigits: 2})"></td>
                                        <td class="px-2 py-2 text-right font-extrabold" :class="inv.balance > 0 ? 'text-red-600' : 'text-slate-500'" x-text="'$' + Number(inv.balance).toLocaleString('es-MX', {minimumFractionDigits: 2})"></td>
                                        <td class="px-2 py-2 text-center text-slate-500 font-semibold" x-text="inv.currency"></td>
                                        <td class="px-2 py-2 text-center">
                                            <span class="px-1.5 py-0.5 rounded text-[10px] font-bold"
                                                :class="inv.balance === 0 ? 'bg-emerald-100 text-emerald-700' : (inv.days_overdue > 0 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700')"
                                                x-text="inv.balance === 0 ? 'Pagada' : (inv.days_overdue > 0 ? inv.days_overdue + ' días' : 'Al corriente')"></span>
                                        </td>
                                    </tr>
                                </template>
                                <template x-if="filteredInvoices().length === 0">
                                    <tr><td colspan="8" class="px-4 py-8 text-center text-slate-400 text-xs">No se encontraron facturas con los filtros seleccionados</td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Footer with Generate button -->
                <div x-show="!loading && data" class="p-4 border-t-2 border-slate-200 bg-slate-50 shrink-0">
                    <button @click="generate()"
                            :disabled="filteredSelectedCount() === 0"
                            class="w-full py-3 rounded-xl text-sm font-black text-white transition-all duration-200 shadow-xl active:scale-95 border-2 flex items-center justify-center gap-2"
                            :class="filteredSelectedCount() > 0 ? 'bg-emerald-600 border-emerald-700 hover:bg-emerald-700 shadow-emerald-300/50 hover:shadow-emerald-400/50' : 'bg-slate-300 border-slate-400 cursor-not-allowed shadow-none'">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                        <span x-text="filteredSelectedCount() > 0 ? 'Generar Estado de Cuenta — ' + filteredSelectedCount() + ' facturas' : 'Seleccione facturas'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Minimized Taskbar Item (Teleported to a global container) -->
    <template x-teleport="#ec-taskbar">
        <div x-show="show && minimized"
             x-cloak
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 translate-y-2"
             class="ec-taskbar-tab" style="pointer-events: auto;">
            <button @click="minimized = false" class="ec-taskbar-tab-btn">
                <svg class="ec-taskbar-tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span class="ec-taskbar-tab-label">EC</span>
                <span class="ec-taskbar-tab-name" x-text="data ? data.customer.card_name : customerName"></span>
            </button>
            <button @click="close()" class="ec-taskbar-tab-close" title="Cerrar">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
    </template>
</div>
</template>

<style>
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Estado de Cuenta Taskbar ── */
    #ec-taskbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.0) 0%, rgba(15, 23, 42, 0.85) 40%, rgba(15, 23, 42, 0.95) 100%);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition: opacity 0.2s ease;
    }
    /* Hide the bar entirely when it has no visible children */
    #ec-taskbar:not(:has(.ec-taskbar-tab[style*="pointer-events: auto"])) {
        opacity: 0;
        pointer-events: none;
    }

    .ec-taskbar-tab {
        display: flex;
        align-items: center;
        gap: 2px;
        animation: ec-tab-slide-up 0.2s ease-out;
    }
    @keyframes ec-tab-slide-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .ec-taskbar-tab-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: rgba(30, 41, 59, 0.9);
        border: 1.5px solid rgba(100, 116, 139, 0.5);
        border-right: none;
        border-radius: 8px 0 0 8px;
        color: white;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s ease;
        max-width: 260px;
        white-space: nowrap;
        overflow: hidden;
    }
    .ec-taskbar-tab-btn:hover {
        background: rgba(51, 65, 85, 0.95);
        border-color: rgba(16, 185, 129, 0.6);
    }

    .ec-taskbar-tab-icon {
        width: 14px;
        height: 14px;
        color: #34d399;
        flex-shrink: 0;
    }

    .ec-taskbar-tab-label {
        font-size: 10px;
        font-weight: 800;
        color: #34d399;
        letter-spacing: 0.04em;
        flex-shrink: 0;
    }

    .ec-taskbar-tab-name {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 160px;
    }

    .ec-taskbar-tab-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 100%;
        min-height: 30px;
        background: rgba(30, 41, 59, 0.9);
        border: 1.5px solid rgba(100, 116, 139, 0.5);
        border-left: 1px solid rgba(100, 116, 139, 0.3);
        border-radius: 0 8px 8px 0;
        color: #64748b;
        cursor: pointer;
        transition: all 0.15s ease;
    }
    .ec-taskbar-tab-close:hover {
        background: #dc2626;
        border-color: #dc2626;
        color: white;
    }
</style>

<!-- Global container for minimized taskbars -->
<div id="ec-taskbar"></div>
