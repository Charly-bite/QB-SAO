<!-- Pendientes Tab — Invoices paid but not in the Relación de Envío -->
<div x-show="activeTab === 'pendientes'" x-cloak class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">

    <!-- Action Bar -->
    <div class="pendientes-action-bar flex flex-wrap items-center gap-3">

        <div class="flex items-center gap-2.5">
            <div class="flex items-center justify-center w-8 h-8 rounded-lg" style="background-color: #fed7aa;">
                <svg class="w-4 h-4" style="color: #c2410c;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <div>
                <span class="text-sm font-extrabold" style="color: #1e293b;">Facturas no incluidas en la Relación de Envío</span>
                <p class="text-[10px] font-medium" style="color: #94a3b8;">Facturas facturadas que aún no se han agregado a ninguna relación</p>
            </div>
        </div>

        <div class="flex-1"></div>

        <!-- Count badge -->
        <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold border"
            :class="pendingInvoices.length === 0 
                ? 'bg-green-50 text-green-700 border-green-200' 
                : ''"
            :style="pendingInvoices.length > 0 ? 'background-color: #fff7ed; color: #c2410c; border-color: #fdba74;' : ''">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span x-text="pendingInvoices.length === 0 ? 'Todo incluido' : pendingInvoices.length + ' pendiente' + (pendingInvoices.length !== 1 ? 's' : '')"></span>
        </div>
    </div>

    <!-- Table grouped by date -->
    <template x-if="pendingInvoices.length > 0">
        <div class="overflow-x-auto">
            <template x-for="(group, gIdx) in pendingInvoicesByDate" :key="group.dateKey">
                <div>
                    <!-- Date Group Header -->
                    <div class="pendientes-date-header">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4" style="color: #ea580c;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <span class="pendientes-date-label" x-text="group.label"></span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="pendientes-date-count" x-text="group.invoices.length + ' factura' + (group.invoices.length !== 1 ? 's' : '')"></span>
                            <span class="pendientes-date-total" x-text="'$' + group.total.toLocaleString('es-MX', {minimumFractionDigits: 2})"></span>
                        </div>
                    </div>

                    <!-- Table for this date group -->
                    <table class="w-full border-collapse">
                        <thead class="pendientes-thead" x-show="gIdx === 0">
                            <tr>
                                <th class="text-left" style="width: 40px;">#</th>
                                <th class="text-left">No. Factura</th>
                                <th class="text-left">No. Pedido</th>
                                <th class="text-left">Cliente</th>
                                <th class="text-right">Importe</th>
                                <th class="text-center">Condición</th>
                                <th class="text-center">Tipo de Envío</th>
                                <th class="text-center">Observación</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="(inv, idx) in group.invoices" :key="inv.invoice_number || idx">
                                <tr class="pendientes-row"
                                    :style="idx % 2 === 0 ? '' : 'background-color: #f8fafc;'">
                                    <!-- # -->
                                    <td style="color: #94a3b8; font-size: 12px; font-weight: 600;" x-text="idx + 1"></td>
                                    <!-- No. Factura -->
                                    <td>
                                        <span class="pendientes-invoice-num" x-text="inv.invoice_number || ''"></span>
                                    </td>
                                    <!-- No. Pedido -->
                                    <td style="color: #64748b; font-size: 12px;" x-text="inv.order_number || '—'"></td>
                                    <!-- Cliente -->
                                    <td style="color: #334155; font-size: 12px; font-weight: 500;" x-text="inv.customer_name || ''"></td>
                                    <!-- Importe -->
                                    <td class="text-right">
                                        <span class="pendientes-amount" x-text="'$' + Number(inv.total || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})"></span>
                                        <span class="pendientes-amount-currency" x-text="inv.currency || 'MXN'"></span>
                                    </td>
                                    <!-- Condición de pago -->
                                    <td class="text-center">
                                        <span class="inline-flex items-center gap-1"
                                            :class="isCredito(inv) ? 'pendientes-badge-credito' : 'pendientes-badge-contado'"
                                            x-text="isCredito(inv) ? 'CRÉDITO' : 'CONTADO'">
                                        </span>
                                    </td>
                                    <!-- Tipo de Envío -->
                                    <td class="text-center">
                                        <span class="inline-flex items-center"
                                            :class="(inv.shipping_type || 'LOCAL').toUpperCase().includes('FORAN') ? 'pendientes-badge-foraneo' : 'pendientes-badge-local'"
                                            x-text="inv.shipping_type || 'LOCAL'">
                                        </span>
                                    </td>
                                    <!-- Observación -->
                                    <td class="text-center" style="color: #64748b; font-size: 12px;" x-text="inv.observaciones || '—'"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- Grand Totals Footer -->
            <table class="w-full border-collapse">
                <tfoot>
                    <tr class="pendientes-footer">
                        <td colspan="4" class="text-right">
                            <span class="pendientes-footer-label">Total Pendiente</span>
                        </td>
                        <td class="text-right">
                            <span class="pendientes-footer-total"
                                x-text="'$' + pendingInvoices.reduce((s, i) => s + Number(i.total || 0), 0).toLocaleString('es-MX', {minimumFractionDigits: 2})">
                            </span>
                        </td>
                        <td colspan="3"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </template>

    <!-- Empty state — all invoices in relación -->
    <template x-if="pendingInvoices.length === 0 && invoices.length > 0">
        <div class="px-6 py-16 text-center">
            <div class="flex flex-col items-center gap-3">
                <svg class="w-12 h-12 text-green-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <p class="text-green-600 font-medium">Todas las facturas están incluidas en la Relación</p>
                <p class="text-sm text-slate-400">No hay facturas pendientes por incluir</p>
            </div>
        </div>
    </template>

    <!-- Empty state — no invoices at all -->
    <template x-if="invoices.length === 0">
        <div class="px-6 py-16 text-center">
            <div class="flex flex-col items-center gap-3">
                <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p class="text-slate-500 font-medium">No hay facturas para esta fecha</p>
            </div>
        </div>
    </template>
</div>
