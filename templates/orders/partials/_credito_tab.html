<!-- Crédito y Cobranza Tab — Per-invoice authorization -->
<div x-show="activeTab === 'credito'" x-cloak class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">

    <!-- Authorization View (Todas/Crédito/Contado subtabs) -->
    <div x-show="creditoSubTab !== 'EstadoCuenta'">

    <!-- Action Bar -->
    <div class="px-4 py-3 flex flex-wrap items-center gap-3 bg-gradient-to-r from-emerald-50 to-white border-b border-slate-100">
        <div class="flex items-center gap-2">
            <span class="text-sm font-bold text-slate-700">Facturas del Día</span>
            <span class="text-xs text-slate-500">(Autorización de Crédito)</span>
        </div>

        <div class="flex-1"></div>

        <!-- Authorization progress badge -->
        <template x-if="creditoTabInvoices && creditoTabInvoices.length > 0">
            <div class="auth-progress-badge" :class="authorizationSummary().pending === 0 ? 'complete' : 'incomplete'">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span x-text="authorizationSummary().authorized + '/' + authorizationSummary().total + ' Autorizados'"></span>
            </div>
        </template>
    </div>

    <!-- Authorization Table -->
    <template x-if="creditoTabFilteredInvoices && creditoTabFilteredInvoices.length > 0">
        <div class="overflow-x-auto">
            <table class="w-full border-collapse text-sm">
                <thead class="pendientes-thead">
                    <tr>
                        <th class="text-left" style="width: 40px;">#</th>
                        <th class="text-left">No. Factura</th>
                        <th class="text-left">Cliente</th>
                        <th class="text-center">Días Mora</th>
                        <th class="text-right">Límite Crédito</th>
                        <th class="text-right">Importe</th>
                        <th class="text-center">Condición</th>
                        <th class="text-center">Observación</th>
                        <th class="text-center w-48">Notas de Crédito</th>
                        <th class="text-center w-28">Autorización</th>
                        <th class="text-center w-40">Autorizado por</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(inv, idx) in creditoTabFilteredInvoices" :key="inv.invoice_number || idx">
                        <tr @contextmenu.prevent="showContextMenu($event, inv)" class="pendientes-row" x-show="true" :style="idx % 2 === 0 ? '' : 'background-color: #f8fafc;'" style="cursor: context-menu;">
                            <!-- # -->
                            <td style="color: #94a3b8; font-size: 12px; font-weight: 600;" x-text="idx + 1"></td>
                            <!-- No. Factura -->
                            <td><span class="pendientes-invoice-num" x-text="inv.invoice_number || ''"></span></td>
                            <!-- Cliente -->
                            <td style="color: #334155; font-size: 12px; font-weight: 500;" x-text="inv.customer_name || ''"></td>
                            <!-- Días Mora -->
                            <td class="text-center">
                                <span class="px-2 py-0.5 rounded text-xs font-bold"
                                      :class="(inv.dias_mora && inv.dias_mora > 0) ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-500'"
                                      x-text="inv.dias_mora ? (inv.dias_mora + ' días') : '-'">
                                </span>
                            </td>
                            <!-- Límite Crédito -->
                            <td class="text-right font-medium text-slate-600">
                                <span x-text="inv.credit_limit ? ('$' + Number(inv.credit_limit).toLocaleString('es-MX', {minimumFractionDigits: 2})) : '$0.00'"></span>
                            </td>
                            <!-- Importe -->
                            <td class="text-right">
                                <span class="pendientes-amount" x-text="'$' + Number(inv.total || 0).toLocaleString('es-MX', {minimumFractionDigits: 2})"></span>
                                <span class="pendientes-amount-currency" x-text="inv.currency || 'MXN'"></span>
                            </td>
                            <!-- Condición de pago -->
                            <td class="text-center">
                                <span class="inline-flex items-center gap-1"
                                    :class="isCredito(inv) ? 'pendientes-badge-credito' : 'pendientes-badge-contado'"
                                    x-text="isCredito(inv) ? 'CRÉDITO' : 'CONTADO'">
                                </span>
                            </td>
                            <!-- Observación -->
                            <td class="text-center" style="color: #64748b; font-size: 12px;" x-text="inv.observaciones || inv.nota || inv.shipping_type || 'LOCAL'"></td>
                            <!-- Notas de Crédito -->
                            <td class="px-2 py-2 text-center" style="color: #64748b; font-size: 12px; vertical-align: top;">
                                <div class="mt-0.5" @click.stop="if(canAuthorizarCredito) editCreditoNotes(inv)" title="Clic para editar nota de crédito">
                                    <template x-if="!inv._editing_credito_notes">
                                        <div class="w-full min-h-[1.5rem] px-1 py-0.5 bg-yellow-50 border border-yellow-200 rounded text-[11px] cursor-pointer" :class="!inv.credito_notes ? 'text-slate-400 italic bg-slate-50 border-transparent' : 'text-slate-800'">
                                            <span x-text="inv.credito_notes || 'Clic para añadir nota'"></span>
                                        </div>
                                    </template>
                                    <template x-if="inv._editing_credito_notes">
                                        <input type="text" x-model="inv._temp_credito_notes" 
                                            @keydown.enter="saveCreditoNotes(inv)" 
                                            @keydown.escape="inv._editing_credito_notes = false"
                                            @blur="saveCreditoNotes(inv)"
                                            x-init="$el.focus()"
                                            class="w-full px-1 py-0.5 border border-amber-400 rounded focus:outline-none focus:ring-1 focus:ring-amber-500 bg-white text-[11px] shadow-sm text-left" />
                                    </template>
                                </div>
                            </td>
                            <!-- Autorización -->
                            <td class="text-center">
                                <button @click="authorizeInvoice(inv)"
                                    class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all duration-200"
                                    :class="inv.credito_authorized 
                                        ? 'bg-green-100 text-green-700 border border-green-300 hover:bg-green-200' 
                                        : 'bg-yellow-100 text-yellow-700 border border-yellow-300 hover:bg-yellow-200 hover:scale-105'"
                                    :disabled="!canAuthorizarCredito && !inv.credito_authorized"
                                    :title="canAuthorizarCredito ? (inv.credito_authorized ? 'Clic para revocar' : 'Clic para autorizar') : 'Solo Crédito y Cobranza puede autorizar'">
                                    <template x-if="inv.credito_authorized">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                                    </template>
                                    <template x-if="!inv.credito_authorized">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    </template>
                                    <span x-text="inv.credito_authorized ? 'Autorizado' : 'Pendiente'"></span>
                                </button>
                            </td>
                            <!-- Autorizado por -->
                            <td class="text-center">
                                <template x-if="inv.credito_authorized && inv.credito_authorized_name">
                                    <div class="flex flex-col items-center gap-0.5">
                                        <span class="text-xs font-medium text-slate-700" x-text="inv.credito_authorized_name"></span>
                                        <span class="text-[10px] text-slate-400" x-text="inv.credito_authorized_at ? new Date(inv.credito_authorized_at).toLocaleString('es-MX', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : ''"></span>
                                    </div>
                                </template>
                                <template x-if="!inv.credito_authorized">
                                    <span class="text-slate-300 text-xs">—</span>
                                </template>
                            </td>
                        </tr>
                    </template>
                </tbody>
                <!-- Totals footer -->
                <tfoot>
                    <tr class="pendientes-footer">
                        <td colspan="5" class="text-right">
                            <span class="pendientes-footer-label">Total</span>
                        </td>
                        <td class="text-right">
                            <span class="pendientes-footer-total"
                                x-text="'$' + creditoTabFilteredInvoices.reduce((s, i) => s + Number(i.total || 0), 0).toLocaleString('es-MX', {minimumFractionDigits: 2})">
                            </span>
                        </td>
                        <td colspan="3"></td>
                        <td class="text-center">
                            <div class="auth-progress-badge" :class="authorizationSummary().pending === 0 ? 'complete' : 'incomplete'">
                                <span x-text="authorizationSummary().authorized + '/' + authorizationSummary().total"></span>
                            </div>
                        </td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </template>

    <!-- Empty state -->
    <template x-if="!creditoTabFilteredInvoices || creditoTabFilteredInvoices.length === 0">
        <div class="px-6 py-16 text-center">
            <div class="flex flex-col items-center gap-3">
                <svg class="w-12 h-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
                <p class="text-slate-500 font-medium">No hay facturas para mostrar hoy</p>
                <p class="text-sm text-slate-400">Verifica que haya facturas emitidas para la fecha seleccionada</p>
            </div>
        </div>
    </template>

    </div> <!-- end Authorization View -->

    <!-- Estado de Cuenta View -->
    {% include 'orders/partials/_credito_estado_cuenta.html' %}

</div>
